services:
  sun-mvp:
    build:
      context: .
    container_name: sun-mvp
    environment:
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      CLAUDE_MAX_ATTEMPTS: ${CLAUDE_MAX_ATTEMPTS:-2}
      PORT: ${PORT:-3020}
      HEADLESS: ${HEADLESS:-true}
      SUN_ALLOWED_HOSTS: ${SUN_ALLOWED_HOSTS:-chirpper.com,www.chirpper.com,localhost,127.0.0.1}
      SUN_MAX_EXECUTION_STEPS: ${SUN_MAX_EXECUTION_STEPS:-8}
      SUN_TIMEOUT_MS: ${SUN_TIMEOUT_MS:-15000}
    ports:
      - "${PORT:-3020}:3020"
    volumes:
      - ./artifacts:/app/artifacts
